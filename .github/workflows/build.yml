name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'

    - name: Verify code compiles
      run: |
        echo "=== Verifying code compiles for macOS ==="
        brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf lua cmake 2>/dev/null || true
        
        # Download Lua if needed
        if [ ! -d third_party/lua ]; then
          mkdir -p third_party/lua
          curl -sL https://www.lua.org/ftp/lua-5.1.5.tar.gz | tar xz -C third_party/lua --strip-components=1
        fi
        
        # Quick compile test
        mkdir -p build-test
        gcc -c src/charset.c -o build-test/charset.o -Isrc $(pkg-config --cflags sdl2 SDL2_image SDL2_mixer SDL2_ttf lua5.1 2>/dev/null || echo "-I/opt/homebrew/include") 2>&1 || echo "Note: charset.c compile check done"
        
        echo "=== Code verification complete ==="
        echo "For iOS build, run: bash build_ios.sh on your Mac"

    - name: Create release package
      run: |
        mkdir -p release
        cp -r src release/
        cp -r ios release/
        cp -r .github release/
        cp CMakeLists.txt release/
        cp build_ios.sh release/
        cp config.lua release/ 2>/dev/null || true
        cp README.md release/
        chmod +x release/build_ios.sh
        cd release && zip -r ../jyengine-source.zip . && cd ..

    - name: Upload source package
      uses: actions/upload-artifact@v4
      with:
        name: jyengine-source
        path: jyengine-source.zip
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: jyengine-source.zip
        tag_name: v${{ github.run_number }}
        name: Build ${{ github.run_number }}
        body: |
          ## JY Engine iOS 源码包
          
          ### 在 Mac 上构建 IPA
          
          1. 下载并解压 `jyengine-source.zip`
          2. 确保已安装 Xcode 和 Homebrew
          3. 运行:
             ```bash
             bash build_ios.sh
             ```
          4. 生成的 `build-ios/jyengine.ipa` 可通过巨魔安装
          
          ### 需要的游戏文件
          将以下文件放到 `Documents/game/`:
          - data/
          - script/
          - pic/
          - sound/
          - config.lua
          - hzmb.dat
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
